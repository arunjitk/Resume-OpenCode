# Hostinger VPS — Nginx config for arunjitk.org
# Place this file at: /etc/nginx/sites-available/arunjitk.org
# Then: sudo ln -s /etc/nginx/sites-available/arunjitk.org /etc/nginx/sites-enabled/

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name arunjitk.org www.arunjitk.org;

    # Let's Encrypt challenge (certbot will manage this)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Main site ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name arunjitk.org www.arunjitk.org;

    # SSL certificates (certbot will fill these in)
    ssl_certificate     /etc/letsencrypt/live/arunjitk.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arunjitk.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # SSE endpoint — must not be buffered and needs a long read timeout
    location /api/chat/events {
        proxy_pass             http://127.0.0.1:3000;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        # Disable ALL buffering so SSE frames are forwarded immediately
        proxy_buffering        off;
        proxy_cache            off;
        # Keep the long-lived SSE stream open (heartbeat fires every 25 s)
        proxy_read_timeout     3600s;
        proxy_send_timeout     3600s;
        # SSE does not need connection upgrade; clearing the header avoids
        # nginx treating the stream as a WebSocket handshake
        proxy_set_header       Connection '';
    }

    # Proxy all other requests to Express
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
